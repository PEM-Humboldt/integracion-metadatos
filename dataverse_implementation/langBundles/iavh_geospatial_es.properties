datasetfieldtype.iavh_geographicBoundingBox.description=El rect\u00e1ngulo envolvente geogr\u00e1fico es la descripci\u00f3n geom\u00e9trica fundamental sobre cualquier dataset que representa a una zona geogr\u00e1fica. Describe el m\u00ednimo recuadro definido por sus longitudes este y oeste y por sus latitudes norte y sur, que incluye la mayor parte de la extensi\u00f3n geogr\u00e1fica cubierta por el dataset. Este elemento se usa como primer paso en una b\u00fasqueda basada en coordenadas. Se recomienda la inclusi\u00f3n de este elemento en un manual de c\u00f3digos, pero es obligatoria si se incluye un pol\u00edgono envolvente geogr\u00e1fico.
