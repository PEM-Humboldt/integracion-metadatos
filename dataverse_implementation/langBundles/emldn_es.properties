datasetfieldtype.emlTaxonomicCoverageDescription.description=Descripci\u00f3n de las categor\u00edas taxon\u00f3micas que mejor representan el recurso. No necesariamente a nivel de especie, pueden listarse familias u otras categor\u00edas que describan la cobertura taxon\u00f3mica del recurso.
datasetfieldtype.emlTaxonomicCoverageClassification.description=Descripci\u00f3n cuantitativa de los taxa representados en el conjunto de datos. Puede generar varias coberturas al nivel taxon\u00f3mico y cada cobertura taxon\u00f3mica tiene su propia descripci\u00f3n. Esta informaci\u00f3n puede ser suministrada para argumentar la informaci\u00f3n presentada en los otros campos, as\u00ed como los detalles de la integridad y el sistema de clasificaci\u00f3n taxon\u00f3mica usado para la identificaci\u00f3n.
