datasetfieldtype.biologicalBiases.description=Describe los sesgos potenciales del conjunto de datos. Pensando al \"universo\" estudiado, \u00bfcuales son los sesgos espaciales, temporales, estad\u00edsticos, taxon\u00f3micos, biol\u00f3gicos, cientificos que provienen de la metodolog\u00eda particular utilizada para crear este conjunto de datos? \u00bfCuales son los riesgos potenciales en pensar que este conjunto de datos es completo y representativo de su objeto de estudio? 
