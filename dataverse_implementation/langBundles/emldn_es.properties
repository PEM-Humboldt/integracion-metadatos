datasetfieldtype.emlTaxonomicCoverageTaxonId.description=Identificador del tax\u00f3n desde una base de datos que sirve como autoridad taxon\u00f3mica (por ejemplo el \"backbone\" de GBIF, ITIS o la base de datos de plantas del USDA). Utilizar un identificador de un sistema exterior permite referenciar informaci\u00f3n adicional sobre el tax\u00f3n, como las autor\u00edas, el historial de la sinonimia, descripciones publicadas o jerarqu\u00eda de rangos taxon\u00f3micos
