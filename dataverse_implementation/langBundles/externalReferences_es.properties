datasetfieldtype.externalReference.description=Grupo de variables para describir una referencia a un documento, archivo, o conjunto de datos fuera de la plataforma
datasetfieldtype.externalReferenceType.description=\"Ubicaci\u00f3n externa del mismos conjunto de datos\": si los archivos est\u00e1n en otra plataforma, si existe otro repositorios con esos datos\n\"Citaci\u00f3n\" : documenta casos de uso de este conjunto (por ejemplo el Atlas de mamiferos)\n\"Referencia biobliogr\u00e1fica\": un documento que ayuda para entender este conjunto de datos (por ejemplo un articulo cientifico que describe la metodolog\u00eda)\n\"Conjunto de datos relacionado\": un conjunto de datos que se puede relacionar (tema, metodolog\u00eda, etc) en esta plataforma o otra\n
datasetfieldtype.citationText.description=Texto que permite describir la referencia externa.  En caso de que el formato de citac\u00edon bibliogr\u00e1fica no aplique, puede ser un t\u00edtulo. 
datasetfieldtype.externalReferenceURL.description=URL externa que permite encontrar el material referenciado
datasetfieldtype.externalReferenceDOI.description=DOI de la referencia externa
datasetfieldtype.externalReferenceOtherId.description=Si la referencia externa no tiene DOI, otros identificadores se pueden utilizar ac\u00e1: ISBN, ISSN etc
datasetfieldtype.externalReferenceNote.description=Aqu\u00ed se pueden describir de manera detallada la relaci\u00f3n entre el conjunto de datos y la referencia externa (por ejemplo si la referencia una citaci\u00f3n para un metodo que se utiliza para la creaci\u00f3n del conjunto de datos, por favor indicarlo ac\u00e1, si es una ubicaci\u00f3n externa de material que pertenece al conjunto de datos, indicar la forma de descargarlos y utilizarlos, etc)
