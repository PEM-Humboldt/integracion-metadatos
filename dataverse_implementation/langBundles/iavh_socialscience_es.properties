datasetfieldtype.iavh_unitOfAnalysis.description=Unidad b\u00e1sica de an\u00e1lisis o de observaci\u00f3n que describe este dataset, como pueden ser individuos, familias/hogares, grupos, instituciones/organizaciones, unidades administrativas y otros. Si necesita informaci\u00f3n sobre el vocabulario controlado DDI, puede visitar la web http://www.ddialliance.org/controlled-vocabularies (en ingl\u00e9s).
datasetfieldtype.iavh_universe.description=Descripci\u00f3n de la poblaci\u00f3n cubierta por los datos del fichero; el grupo de poblaci\u00f3n u otros elementos que son el objeto del estudio y a los cuales dicho estudio se refiere. Edad, nacionalidad y residencia normalmente ayudan a delimitar el universo dado, pero pueden usarse tambi\u00e9n otros factores, como l\u00edmites de edad, sexo, estado civil, raza, grupo \u00e9tnico, renta, condici\u00f3n de veterano de guerra, antecedentes penales, entre otros. El universo puede estar formado por elementos distintos a personas como unidades habitacionales, causas judiciales, muertes o pa\u00edses entre otros. En general, con la descripci\u00f3n del universo, deber\u00e1 poder decirse si un individuo particular o elemento es parte de la poblaci\u00f3n que se est\u00e1 estudiando. Tambi\u00e9n se le llama universo de inter\u00e9s, poblaci\u00f3n de inter\u00e9s y poblaci\u00f3n objetivo.
datasetfieldtype.iavh_timeMethod.description=El m\u00e9todo temporal o la dimensi\u00f3n temporal de la recolecci\u00f3n de datos, como por panel, estudio transversal, tendencias, series temporales y otros.
datasetfieldtype.iavh_timePeriodCovered.description=Periodo de tiempo que abarcan los datos. Este tiempo refleja el periodo cubierto por los datos, no las fechas de codificaci\u00f3n, de creaci\u00f3n de documentos legibles por las m\u00e1quinas o las fechas en la que los datos fueron recolectados. Tambi\u00e9n se conoce como extensi\u00f3n.
datasetfieldtype.iavh_timePeriodCoveredStart.description=Fecha que indica el inicio del periodo de tiempo cubierto por los datos, no las fechas de codificaci\u00f3n, ni de la creaci\u00f3n de documentos legibles por las m\u00e1quinas ni de recolecci\u00f3n de los datos.
datasetfieldtype.iavh_timePeriodCoveredEnd.description=Fecha que indica el fin del periodo de tiempo cubierto por los datos, no las fechas de codificaci\u00f3n, ni de la creaci\u00f3n de documentos legibles por las m\u00e1quinas ni de recolecci\u00f3n de los datos.
datasetfieldtype.iavh_dateOfCollection.description=Contiene la(s) fecha(s) en las que los datos fueron recolectados.
datasetfieldtype.iavh_dateOfCollectionStart.description=Fecha en la que se inici\u00f3 la recolecci\u00f3n de los datos.
datasetfieldtype.iavh_dateOfCollectionEnd.description=Fecha en la que se finaliza la recolecci\u00f3n de los datos.
datasetfieldtype.iavh_frequencyOfDataCollection.description=Si los datos se recolectan en distintos momentos, indicar la frecuencia de recolecci\u00f3n. Puede ser mensual, cuatrimestral u otra.
datasetfieldtype.iavh_dataCollector.description=Individuo, agencia u organizaci\u00f3n responsable de administrar el cuestionario o entrevista y reunir los datos.
datasetfieldtype.iavh_collectorTraining.description=Tipo de formaci\u00f3n ofrecida al recolector de datos
datasetfieldtype.iavh_samplingProcedure.description=Tipo de muestra y dise\u00f1o de la muestra usado para que la selecci\u00f3n de los encuestados represente a la poblaci\u00f3n. Se puede hacer referencia al tama\u00f1o de muestra y a la fracci\u00f3n de muestreo.
datasetfieldtype.iavh_targetSampleSize.description=Informaci\u00f3n espec\u00edfica relativa al tama\u00f1o de la muestra objetivo, tama\u00f1o de muestra real y la f\u00f3rmula para determinarla.
datasetfieldtype.iavh_targetSampleActualSize.description=Tama\u00f1o de muestra real
datasetfieldtype.iavh_targetSampleSizeFormula.description=F\u00f3rmula usada para definir el tama\u00f1o de muestra objetivo.
datasetfieldtype.iavh_deviationsFromSampleDesign.description=Mostrar la correspondencia, as\u00ed como las discrepancias entre las unidades de muestreo (obtenidas) y las estad\u00edsticas disponibles para la poblaci\u00f3n (edad, proporci\u00f3n de sexos, estado civil, etc.) de forma global.
datasetfieldtype.iavh_collectionMode.description=M\u00e9todo usado para recolectar los datos; caracter\u00edsticas de la instrumentaci\u00f3n (ej: entrevista telef\u00f3nica, cuestionario por e-mail, u otro).
datasetfieldtype.iavh_researchInstrument.description=Tipo de instrumento usado para la recolecci\u00f3n de datos. \"Estructurado\" indica un instrumento en el cual a todos los entrevistados les hacen las mismas preguntas/tests, quiz\u00e1 con las mismas respuestas precodificadas. Si una peque\u00f1a parte del cuestionario incluye preguntas abiertas, provea los comentarios apropiados. \"Semi-estructurado\" indica que los instrumentos de investigaci\u00f3n incluyen muchas preguntas abiertas. \"Sin estructura\" indica que se realizaron entrevistas minuciosas.
datasetfieldtype.iavh_dataCollectionSituation.description=Descripci\u00f3n de aspectos considerables de la situaci\u00f3n de la recolecci\u00f3n de datos, incluyendo informaci\u00f3n de temas como la cooperaci\u00f3n de los encuestados, duraci\u00f3n de las entrevistas, n\u00famero de llamadas respondidas, y datos similares.
datasetfieldtype.iavh_actionsToMinimizeLoss.description=Resumen de las acciones tomadas para minimizar la p\u00e9rdida de datos, incluyendo la informaci\u00f3n de acciones como seguimiento de visitas, chequeos de supervisi\u00f3n, casaci\u00f3n de datos hist\u00f3ricos, estimaciones y otras.
datasetfieldtype.iavh_controlOperations.description=M\u00e9todos usados para facilitar el control de datos realizados por el investigador primario o por el archivo de datos.
datasetfieldtype.iavh_weighting.description=El uso de procedimientos de muestreo puede hacer necesario aplicar pesos para producir resultados estad\u00edsticos fiables. Describa el criterio para usar pesos en el an\u00e1lisis de una colecci\u00f3n. Si se ha desarrollado una f\u00f3rmula de pesos o un coeficiente, se indica la f\u00f3rmula, est\u00e1n definidos sus elementos y se indica como se aplica la f\u00f3rmula a los datos.
datasetfieldtype.iavh_cleaningOperations.description=M\u00e9todos usados para limpiar la colecci\u00f3n de datos, como pruebas de consistencia, verificaci\u00f3n de c\u00f3digo no v\u00e1lido y otros.
datasetfieldtype.iavh_datasetLevelErrorNotes.description=Observaciones utilizadas para apuntar informaci\u00f3n o clarificar la metodolog\u00eda y el procesamiento del estudio.
datasetfieldtype.iavh_responseRate.description=Porcentaje de los miembros de la muestra que han proporcionado informaci\u00f3n.
datasetfieldtype.iavh_samplingErrorEstimates.description=Medida de la precisi\u00f3n de la estimaci\u00f3n de la poblaci\u00f3n para una muestra en concreto.
datasetfieldtype.iavh_otherDataAppraisal.description=Otras cuestiones relacionadas con la evaluaci\u00f3n de los datos. Describa cuestiones como la varianza de las respuestas, tasa de encuestas no respondidas, pruebas de sesgos y otras similares.
datasetfieldtype.iavh_socialScienceNotes.description=Observaciones generales sobre este dataset.
datasetfieldtype.iavh_socialScienceNotesType.description=Tipo de observaci\u00f3n.
datasetfieldtype.iavh_socialScienceNotesSubject.description=Tema de la observaci\u00f3n.
datasetfieldtype.iavh_socialScienceNotesText.description=Texto para esta observaci\u00f3n.
datasetfieldtype.iavh_socialScienceBiases.description=Describe los sesgos potenciales del conjunto de datos. Pensando al \"universo\" estudiado, \u00bfcuales son los sesgos espaciales, temporales, estad\u00edsticos, sociales, cientificos que provienen de la metodolog\u00eda particular utilizada para crear este conjunto de datos? \u00bfCuales son los riesgos potenciales en pensar que este conjunto de datos es completo y representativo de su objeto de estudio?
datasetfieldtype.iavh_socioEcologicalTemplate.description=Referencia la plantilla que se us\u00f3 para organizar este conjunto de datos. Por favor, poner el nombre y la versi\u00f3n utilizada 
